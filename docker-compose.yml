version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: content_broadcasting_system
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/content_broadcasting_system?schema=public
      JWT_SECRET: change_this_to_a_long_random_secret_in_production
      JWT_EXPIRES_IN: 12h
      MAX_FILE_SIZE_MB: 10
      DEFAULT_ROTATION_MINUTES: 5
      STORAGE_DRIVER: local
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 100
      LIVE_CACHE_TTL_SECONDS: 30
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
