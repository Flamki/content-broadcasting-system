databases:
  - name: content-broadcasting-db
    plan: free
    databaseName: content_broadcasting_system
    user: cbs_user

services:
  - type: web
    name: content-broadcasting-api
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run db:seed
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: content-broadcasting-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: MAX_FILE_SIZE_MB
        value: 10
      - key: DEFAULT_ROTATION_MINUTES
        value: 5
      - key: STORAGE_DRIVER
        value: local
      - key: REDIS_URL
        value: ""
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX
        value: 100
      - key: LIVE_CACHE_TTL_SECONDS
        value: 30
